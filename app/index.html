<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CI/CD Learning Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #0f172a;
      color: white;
    }
    .card {
      text-align: center;
      padding: 2rem;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #1e293b;
    }
    h1 { color: #38bdf8; }
    p  { color: #94a3b8; }
    .badge {
      display: inline-block;
      background: #22c55e;
      color: white;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚀 CI/CD Pipeline Live!</h1>
    <p>Deployed automatically via GitHub Actions → Docker → AWS EC2</p>
    <span class="badge">✅ Version 1.0</span>
  </div>
</body>
</html>
